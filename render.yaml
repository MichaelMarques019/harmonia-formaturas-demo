services:
  - type: web
    name: harmonia-formaturas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render gera automaticamente
      - key: ADMIN_PASSWORD
        sync: false                  # Você preenche no painel do Render
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SITE_URL
        sync: false                  # Ex: https://harmonia-formaturas.onrender.com
      - key: DIAS_EXPIRACAO
        value: "7"
      - key: DATABASE_URL
        fromDatabase:
          name: harmonia-db
          property: connectionString

databases:
  - name: harmonia-db
    databaseName: harmonia
    user: harmonia_user
    plan: free
