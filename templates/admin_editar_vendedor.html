{% extends "base.html" %}
{% block title %}Editar Vendedor — Harmonia{% endblock %}
{% block content %}
<div class="form-wrap">
  <h2>Editar vendedor</h2>
  <p class="sub">{{ vendedor.nome }}</p>
  <form method="POST">
    <div class="fg"><label>Nome</label><input type="text" name="nome" value="{{ vendedor.nome }}" required></div>
    <div class="fg"><label>Nova senha (deixe em branco para não mudar)</label><input type="text" name="nova_senha" placeholder="Nova senha..."></div>
    <div class="fg">
      <label>Status</label>
      <label class="checkbox-item" style="display:inline-flex">
        <input type="checkbox" name="ativo" {% if vendedor.ativo %}checked{% endif %}>
        <label>Vendedor ativo</label>
      </label>
    </div>
    <p class="section-sep">Escolas visíveis</p>
    <p class="form-hint" style="margin-bottom:12px">Deixe sem marcar para ver TODAS.</p>
    <div class="checkbox-group">
      {% set ids = vendedor.get_escolas_ids() %}
      {% for e in escolas %}
        <label class="checkbox-item">
          <input type="checkbox" name="escolas_ids" value="{{ e.id }}" {% if e.id in ids %}checked{% endif %}>
          <label style="cursor:pointer">{{ e.nome }}</label>
        </label>
      {% endfor %}
    </div>
    <div class="form-actions" style="margin-top:28px">
      <a href="{{ url_for('admin_painel') }}" class="btn btn-ghost btn-sm">Cancelar</a>
      <button type="submit" class="btn btn-gold btn-sm">Salvar</button>
    </div>
  </form>
</div>
{% endblock %}
