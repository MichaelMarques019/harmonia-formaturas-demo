{% extends "base.html" %}
{% block title %}Admin — Harmonia Formaturas{% endblock %}

{% block extra_head %}
<style>
.login-scene{min-height:calc(100vh - 58px);display:flex;align-items:center;
             justify-content:center;padding:24px}
.lcard{background:var(--bg2);border:.5px solid var(--line2);padding:52px 44px;
       width:100%;max-width:380px}
.lcard-head{text-align:center;margin-bottom:40px}
.seal{width:46px;height:46px;border:.5px solid var(--line2);border-radius:50%;
      display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
      color:var(--gold);font-size:18px}
.lcard-head h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;
               color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.lcard-head p{font-size:12px;color:var(--cream3)}
.lswitch{text-align:center;margin-top:18px;font-size:12px;color:var(--cream3)}
</style>
{% endblock %}

{% block content %}
<div class="login-scene">
  <div class="lcard">
    <div class="lcard-head">
      <div class="seal">⚙</div>
      <h2>Administração</h2>
      <p>Harmonia Formaturas & Buffet</p>
    </div>
    <form method="POST">
      <div class="fg">
        <label>Senha de acesso</label>
        <input type="password" name="senha" placeholder="••••••••" required autofocus>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center">
        Entrar
      </button>
    </form>
    <div class="lswitch">
      <a href="{{ url_for('login') }}">← Área do cliente</a>
    </div>
  </div>
</div>
{% endblock %}
