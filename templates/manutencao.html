<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em manutenção — Harmonia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:#110E09;color:#F5F0E8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:440px}
.orn{font-size:32px;opacity:.3;margin-bottom:28px;color:#C9A84C}
h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:#C9A84C;margin-bottom:12px}
p{font-size:14px;color:#8C7E6A;line-height:1.7;margin-bottom:28px}
.tag{display:inline-block;padding:6px 16px;background:rgba(201,168,76,.1);border:.5px solid rgba(201,168,76,.25);color:#C9A84C;font-size:11px;letter-spacing:2px;text-transform:uppercase;border-radius:1px}
</style>
</head>
<body>
<div class="wrap">
  <div class="orn">⚙</div>
  <h1>Em manutenção</h1>
  <p>Estamos fazendo melhorias no sistema.<br>Voltamos em breve!</p>
  <div class="tag">Harmonia Formaturas & Buffet</div>
</div>
</body>
</html>
